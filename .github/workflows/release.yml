on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}

jobs:
  test:
    uses: ./.github/workflows/checks.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # for semantic-release
          persist-credentials: false
      - uses: actions/create-github-app-token@v3
        id: get-token
        with:
          client-id: ${{ vars.TOKEN_PROVIDER_APP_CLIENT_ID }}
          private-key: ${{ secrets.TOKEN_PROVIDER_APP_PRIVATE_KEY }}
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail
          npm install --global \
              semantic-release@19 \
              @semantic-release-cargo/semantic-release-cargo@2 \
              @semantic-release/changelog@6 \
              @semantic-release/git@10 \
              conventional-changelog-conventionalcommits@5

          semantic-release
